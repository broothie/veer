version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz

brews:
  - repository:
      owner: broothie
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/broothie/veer
    description: A live-diffing TUI for coding with AI
    license: MIT
    install: |
      bin.install "veer"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
