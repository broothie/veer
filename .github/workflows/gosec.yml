name: gosec

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: securego/gosec@master
        with:
          args: ./...
